name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d ".next" ]; then
            echo "Build output .next/ not found"
            exit 1
          fi
          echo "Build output verified"

  link-check:
    name: Internal link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal links in MDX files
        continue-on-error: true
        run: |
          echo "Scanning content/docs/ for broken internal links..."
          EXIT=0
          # Collect all valid doc slugs from file paths
          SLUGS=$(find content/docs -name '*.mdx' | sed 's|content/docs/||;s|/index\.mdx$||;s|\.mdx$||')

          for file in $(find content/docs -name '*.mdx'); do
            # Extract internal links like [text](/docs/foo) or href="/docs/foo"
            LINKS=$(grep -oE '\(/docs/[^)#"]+' "$file" | sed 's|^(||' || true)
            LINKS="$LINKS $(grep -oE 'href="/docs/[^"#]+' "$file" | sed 's|^href="||' || true)"

            for link in $LINKS; do
              # Normalize: strip /docs/ prefix and trailing slash
              slug=$(echo "$link" | sed 's|^/docs/||;s|/$||')
              if [ -z "$slug" ]; then continue; fi
              # Check if slug matches a known file
              if ! echo "$SLUGS" | grep -qx "$slug"; then
                echo "::warning file=$file::Possibly broken link: $link"
                EXIT=1
              fi
            done
          done

          if [ "$EXIT" -eq 0 ]; then
            echo "All internal links look good"
          else
            echo "Some links may be broken (non-blocking)"
          fi
